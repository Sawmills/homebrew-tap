name: Weekly Public Install Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    name: brew-install-smoke
    runs-on: macos-latest
    steps:
      - name: Install from public tap
        shell: bash
        run: |
          set -euo pipefail

          brew update
          brew untap sawmills/public-tap >/dev/null 2>&1 || true
          brew tap sawmills/public-tap https://github.com/Sawmills/homebrew-public-tap

          brew uninstall --force sm >/dev/null 2>&1 || true
          brew install sawmills/public-tap/sm
          sm --version

  alert-on-failure:
    name: alert-on-failure
    needs: smoke
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = "[ci-alert] Weekly public brew install smoke failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "Weekly public brew install smoke test failed.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Attempt: ${context.runAttempt}`,
              `- SHA: ${context.sha}`,
              `- Ref: ${context.ref}`,
              "",
              "Please investigate and rerun after fixing the issue."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title === title
            );
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing alert issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            core.info(`Created alert issue #${created.data.number}`);
